name: Regenerate Widget PNGs

# Runs whenever widget source or golden test files change in either project.
# Regenerates the committed PNGs and pushes them back.
on:
  workflow_dispatch:
  push:
    paths:
      - 'reference/lib/widgets/**'
      - 'reference/test/screenshots/**'
      - 'reference/test/flutter_test_config.dart'
      - 'app/lib/widgets/**'
      - 'app/lib/screens/**'
      - 'app/test/screenshots/**'
      - 'app/test/flutter_test_config.dart'

# Write permission is required to push the regenerated PNGs back to the branch.
permissions:
  contents: write

jobs:
  regenerate-goldens:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Persist the token so the final git push is authenticated.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Get dependencies (reference)
        run: flutter pub get
        working-directory: reference

      - name: Get dependencies (app)
        run: flutter pub get
        working-directory: app

      # --update-goldens writes new PNGs instead of failing on mismatches.
      - name: Regenerate golden PNGs (reference)
        run: flutter test --update-goldens test/screenshots/
        working-directory: reference

      - name: Regenerate golden PNGs (app)
        run: flutter test --update-goldens test/screenshots/
        working-directory: app

      - name: Commit and push updated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reference/test/goldens/ app/test/goldens/
          if git diff --staged --quiet; then
            echo "Goldens unchanged – nothing to commit."
          else
            git commit -m "chore: regenerate widget PNGs [skip ci]"
            git push origin HEAD
          fi
